name: helm-package-and-push

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'charts/**'
      - '.github/workflows/helm.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/nginx-rtmp-server

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Login to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Determine chart version
        id: version
        run: |
          CHART_VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            CHART_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${CHART_VERSION}"

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Package chart
        run: |
          helm package ${{ env.CHART_PATH }} \
            --version ${{ steps.version.outputs.version }} \
            --destination dist

      - name: Push chart to GHCR
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push \
            dist/nginx-rtmp-server-${{ steps.version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${OWNER_LC}/charts
