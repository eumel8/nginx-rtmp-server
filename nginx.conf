worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /run/nginx/nginx.pid;

events {
    worker_connections  1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        ping 30s;
        notify_method get;

        application live {
            live on;
            record off;

            # HLS output (kept in tmpfs / emptyDir)
            hls on;
            hls_path /var/hls;
            hls_fragment 3s;
            hls_playlist_length 60s;

            # DASH output
            dash on;
            dash_path /var/dash;

            # By default allow publishing only from cluster network.
            # Adjust via custom config if you need auth.
            allow publish all;
            allow play all;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    access_log    /var/log/nginx/access.log;

    server_tokens off;

    server {
        listen 8080;
        server_name _;

        # RTMP statistics page
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # HLS
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # DASH
        location /dash {
            types {
                application/dash+xml mpd;
                video/mp4 mp4;
            }
            root /var;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Liveness / readiness
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = / {
            return 302 /stat;
        }
    }
}
