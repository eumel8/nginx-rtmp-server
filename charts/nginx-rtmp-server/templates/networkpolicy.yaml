apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nginx-rtmp-server.fullname" . }}
  labels:
    {{- include "nginx-rtmp-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nginx-rtmp-server.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - port: 1935
          protocol: TCP
        - port: 8080
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
